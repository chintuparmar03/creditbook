databases:
  - name: creditbook-db
    plan: free
    databaseName: creditbook_db
    region: oregon

services:
  - type: web
    name: creditbook-api
    runtime: python
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn creditbook.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DATABASE_URL
        fromDatabase:
          name: creditbook-db
          property: connectionString
